<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Closing Dua Legenda Grup - Final Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="p-4 md:p-8">
    <div class="max-w-7xl mx-auto no-print">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="title-frame shadow-sm">
                <h1 class="text-2xl font-black text-gray-900 tracking-tighter uppercase">Dua Legenda Grup</h1>
                <div class="h-0.5 bg-gray-900 my-1"></div>
                <p class="text-[10px] font-bold text-gray-600 tracking-widest uppercase text-center">Sistem Laporan Digital</p>
            </div>
            <div class="flex gap-2">
                <button onclick="saveToLog()" class="bg-indigo-600 text-white px-4 py-2 rounded-lg text-xs font-bold hover:bg-indigo-700 transition flex items-center shadow-md">
                    <i class="fas fa-save mr-2"></i>Simpan ke Log
                </button>
                <button onclick="resetDraft()" class="bg-white text-red-600 border border-red-200 px-4 py-2 rounded-lg text-xs font-bold hover:bg-red-50 transition">
                    <i class="fas fa-eraser mr-2"></i>Reset Form
                </button>
            </div>
        </header>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8">
            <div class="xl:col-span-2 space-y-6">
                <div id="expense-container" class="space-y-6 expense-list"></div>
                </div>

            <div class="xl:col-span-1">
                <div class="sticky top-8 space-y-6">
                    <div id="receipt-preview" class="receipt-container receipt-font text-[13px] text-black shadow-2xl">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <div id="print-area"></div>

    <script src="script.js"></script>
</body>
</html>
